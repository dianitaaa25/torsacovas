<title>Soledad entre estrellas | Dibujo de Héctor Samil Acosta | Torsacovas</title>
<meta name="description" content="Soledad entre estrellas, obra de Héctor Samil Acosta en Torsacovas. Pintura que explora la sensación de estar rodeado de grandeza e infinitud, pero aún así experimentar la soledad.">

<link rel="icon" href="assets/img/logo/torsacovas.ico">
<link rel="preload" href="/assets/img/menu/menu.png" as="image" fetchpriority="high">
<link rel="stylesheet" href="assets/css/style.css">

<div class="page-wrap">

  <div class="crp obra">

    <div class="obra-contenedor">

      <figure class="obra-imagen">
        <img src="assets/img/pages/dibujos/soledad-entre-estrellas.webp"
             class="dibujo-click"
             alt="Soledad entre estrellas">      
      </figure>

      <section class="obra-info">

        <h1 class="obra-titulo">Soledad entre estrellas</h1>

        <p class="obra-fecha">2023</p>

        <p class="obra-descripcion">
          Las estrellas suelen representar inmensidad, belleza o infinitud. 
          Estar entre ellas puede transmitir la idea de encontrarse rodeado de 
          algo grandioso, pero aun así sentirse solo. Esta representa mi primera pintura.
        </p>
